name: Finance Facts Auto Upload

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"   # Runs every day at 14:00 UTC (9 AM CT)

jobs:
  run-finance-facts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run finance-facts generator
        run: |
          python main.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v3
        with:
          name: finance-video
          path: output/*.mp4

      - name: Cleanup temp files
        run: |
          rm -rf temp || true
