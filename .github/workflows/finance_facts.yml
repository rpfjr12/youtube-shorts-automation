name: Finance Facts Auto Upload

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * *"   # Runs every day at 14:00 UTC (9 AM CT)

jobs:
  run-finance-facts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GOOGLE_APPLICATION_CREDENTIALS=google_creds.json" >> .env
          echo "ENABLE_YOUTUBE_UPLOAD=true" >> .env

      - name: Add Google credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDS_JSON }}" > google_creds.json

      - name: Run finance-facts generator
        run: |
          python main.py --run-now --channel default

      - name: Cleanup temp files
        run: |
          rm -rf temp || true
